# Music shelf for /personal/. Add entries to the top.
#
# Each entry should have EITHER an album/cover image OR an embedded YouTube video:
#   cover:   path to a local image under assets/img/personal/music/...
#   youtube: the 11-char YouTube video ID (the part after `v=` in a watch URL,
#            or after `/embed/` in an embed URL — NOT the full URL)
#
# Optional fields:
#   title    — track or album name (shown under the cover)
#   artist   — artist name (shown under the title)
#   link     — opens when you click an album cover (Spotify, Apple Music, etc.)
#   note     — short caption shown under artist name
#
# Examples below — replace with your own picks.

# - title: AAA
#   artist: HYUKOH(혁오), Sunset Rollercoaster
#   youtube: MUHadUugJ9g


